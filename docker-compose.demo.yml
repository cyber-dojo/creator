# Demo-only overlay, layered on top of docker-compose.yml.
#
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml up nginx
#
# Unlike the tests (which use the cut-down nginx_stub in docker-compose.yml),
# the demo runs the REAL cyber-dojo nginx and the full set of services it
# routes to, so you can create a group/kata in creator and then edit it in
# web. Bringing up nginx cascades (via depends_on) to web, creator, differ,
# dashboard and the services they need. See bin/demo.sh.

services:

  nginx:
    image: ${CYBER_DOJO_NGINX_IMAGE}:${CYBER_DOJO_NGINX_TAG}
    platform: linux/amd64
    user: root
    init: true
    ports: [ "${CYBER_DOJO_NGINX_HOST_PORT:-80}:80" ]
    restart: "no"
    depends_on:
      - web
      - creator
      - differ
      - dashboard

  web:
    image: ${CYBER_DOJO_WEB_IMAGE}:${CYBER_DOJO_WEB_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env, web.env ]
    read_only: true
    tmpfs: /tmp
    restart: "no"
    depends_on:
      - creator
      - dashboard
      - differ
      - runner
      - saver

  differ:
    image: ${CYBER_DOJO_DIFFER_IMAGE}:${CYBER_DOJO_DIFFER_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    tmpfs: /tmp
    restart: "no"
    depends_on:
      - saver

  dashboard:
    image: ${CYBER_DOJO_DASHBOARD_IMAGE}:${CYBER_DOJO_DASHBOARD_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    tmpfs: /tmp
    restart: "no"
    depends_on:
      - saver
