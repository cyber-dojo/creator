
services:

  # The client/selenium tests run against this cut-down nginx stub, NOT the
  # real cyber-dojo nginx (used in the demo - see docker-compose.demo.yml).
  # The real nginx rate-limits /creator/ (zone=creator_choose, 60r/m burst 10).
  # The selenium tests load several pages in quick succession, each pulling
  # the html plus app.css and app.js through /creator/, which would trip the
  # 429 rate-limit and make the tests flaky. The stub deliberately omits the
  # rate-limiting (and the lazy resolver and the rest of the cyber-dojo
  # routing) so the tests stay simple, isolated and deterministic.
  nginx_stub:
    image: cyberdojo/nginx_creator_stub
    platform: linux/amd64
    ports: [ "${CYBER_DOJO_NGINX_PORT}:${CYBER_DOJO_NGINX_PORT}" ]
    user: root
    build:
      context: nginx_stub
    depends_on:
      - client

  # - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

  client:
    build:
      args: [ COMMIT_SHA ]
      context: client
    image: ${CYBER_DOJO_CREATOR_CLIENT_IMAGE}:${CYBER_DOJO_CREATOR_TAG}
    platform: linux/amd64
    env_file: [ .env ]
    ports: [ "${CYBER_DOJO_CREATOR_CLIENT_PORT}:${CYBER_DOJO_CREATOR_CLIENT_PORT}" ]
    user: ${CYBER_DOJO_CREATOR_CLIENT_USER}
    depends_on:
      - custom-start-points    # for test data
      - exercises-start-points # for test data
      - languages-start-points # for test data
      - selenium
      - creator
    read_only: true
    restart: "no"
    volumes:
      - "./test:/app/test/:ro"
      - type: tmpfs
        target: /tmp
        tmpfs:
          mode: 01777
          size: 10485760  # 10MB

  # - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

  creator:
    build:
      args: [ COMMIT_SHA ]
      context: .
    image: ${CYBER_DOJO_CREATOR_IMAGE}:${CYBER_DOJO_CREATOR_TAG}
    platform: linux/amd64
    env_file: [ .env ]
    ports: [ "${CYBER_DOJO_CREATOR_PORT}:${CYBER_DOJO_CREATOR_PORT}" ]
    user: ${CYBER_DOJO_CREATOR_SERVER_USER}
    depends_on:
      - custom-start-points
      - exercises-start-points
      - languages-start-points
      - runner
      - saver
    read_only: true
    restart: "no"
    volumes:
      - "./test:/app/test/:ro"
      - type: tmpfs
        target: /tmp
        tmpfs:
          mode: 01777
          size: 10485760  # 10MB

  custom-start-points:
    image: ${CYBER_DOJO_CUSTOM_START_POINTS_IMAGE}:${CYBER_DOJO_CUSTOM_START_POINTS_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    restart: "no"
    volumes:
      - type: tmpfs
        target: /tmp
        tmpfs:
          mode: 01777
          size: 10485760  # 10MB

  exercises-start-points:
    image: ${CYBER_DOJO_EXERCISES_START_POINTS_IMAGE}:${CYBER_DOJO_EXERCISES_START_POINTS_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    restart: "no"
    volumes:
      - type: tmpfs
        target: /tmp
        tmpfs:
          mode: 01777
          size: 10485760  # 10MB

  languages-start-points:
    image: ${CYBER_DOJO_LANGUAGES_START_POINTS_IMAGE}:${CYBER_DOJO_LANGUAGES_START_POINTS_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    restart: "no"
    volumes:
      - type: tmpfs
        target: /tmp
        tmpfs:
          mode: 01777
          size: 10485760  # 10MB

  runner:
    image: ${CYBER_DOJO_RUNNER_IMAGE}:${CYBER_DOJO_RUNNER_TAG}
    platform: linux/amd64
    user: root
    env_file: [ .env ]
    read_only: true
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - type: tmpfs
        target: /tmp
        tmpfs:
          mode: 01777
          size: 10485760  # 10MB

  saver:
    image: ${CYBER_DOJO_SAVER_IMAGE}:${CYBER_DOJO_SAVER_TAG}
    platform: linux/amd64
    user: saver
    env_file: [ .env ]
    init: true
    read_only: true
    restart: "no"
    tmpfs:
      - /cyber-dojo:uid=19663,gid=65533
      - /tmp:uid=19663,gid=65533

  selenium:
    image: selenium/standalone-firefox
    platform: linux/amd64
    ports: [ "4444:4444" ]

  asset_builder:
    image: ${CYBER_DOJO_ASSET_BUILDER_IMAGE}:${CYBER_DOJO_ASSET_BUILDER_TAG}
    platform: linux/amd64
    user: nobody
    container_name: ${CYBER_DOJO_ASSET_BUILDER_CONTAINER_NAME}
    ports: [ "${CYBER_DOJO_ASSET_BUILDER_PORT}:${CYBER_DOJO_ASSET_BUILDER_PORT}" ]
    env_file: [ .env.asset_builder ]
    read_only: true
    restart: no
    volumes:
      - ./app/assets/stylesheets:/app/app/assets/stylesheets:ro
      - ./app/assets/javascripts:/app/app/assets/javascripts:ro
      - type: tmpfs
        target: /tmp
        tmpfs:
          mode: 01777
          size: 10485760  # 10MB
