# See ./gitlab/workflows/readme.md

image: registry.gitlab.com/cyber-dojo/ci-runner:v7

stages:
  - trigger

trigger-main:
  stage: trigger
  rules:
    - if: $CI_COMMIT_TAG == null
    - when: never
  trigger:
    include: .gitlab/workflows/main.yml
    strategy: depend

trigger-staging:
  stage: trigger
  rules:
    - if: $CI_COMMIT_TAG == null
    - when: never
  trigger:
    include: .gitlab/workflows/main_staging.yml
    strategy: depend
