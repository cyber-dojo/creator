#  only: [ merge_requests ]
#  script:
#    - echo "CI_PIPELINE_SOURCE==:${CI_PIPELINE_SOURCE}:"
#    - echo "CI_COMMIT_BRANCH==:${CI_COMMIT_BRANCH}:"
#    - echo "CI_DEFAULT_BRANCH==:${CI_DEFAULT_BRANCH}:"


trigger-main:
  stage: trigger
  only: [ merge_requests ]
  trigger:
    include: .gitlab/workflows/main.yml
    strategy: depend

trigger-staging:
  stage: trigger
  only: [ merge_requests ]
  trigger:
    include: .gitlab/workflows/report-to-staging.yml
    strategy: depend
