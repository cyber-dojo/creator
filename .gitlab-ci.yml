image: registry.gitlab.com/cyber-dojo/ci-runner:v3

stages:
  - trigger

trigger-main:
  stage: trigger
  trigger:
    include: .gitlab/workflows/main.yml
    strategy: depend

trigger-staging:
  stage: trigger
  trigger:
    include: .gitlab/workflows/report-to-staging.yml
    strategy: depend
