trigger-main:
  stage: trigger
  rules:
    - if: $CI_COMMIT_TAG == null
    - when: never
  variables:
    GIT_STRATEGY: clone
  trigger:
    include: .gitlab/workflows/main.yml
    strategy: depend

trigger-staging:
  stage: trigger
  rules:
    - if: $CI_COMMIT_TAG == null
    - when: never
  variables:
    GIT_STRATEGY: clone
  trigger:
    include: .gitlab/workflows/main_staging.yml
    strategy: depend

trigger-main-trails:
  stage: trigger
  rules:
    - if: $CI_COMMIT_TAG == null
    - when: never
  variables:
    GIT_STRATEGY: clone
  trigger:
    include: .gitlab/workflows/trails.yml
    strategy: depend

trigger-staging-trails:
  stage: trigger
  rules:
    - if: $CI_COMMIT_TAG == null
    - when: never
  variables:
    GIT_STRATEGY: clone
  trigger:
    include: .gitlab/workflows/trails_staging.yml
    strategy: depend

