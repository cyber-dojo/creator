# See ./gitlab/workflows/readme.md
# See ./gitlab/workflows/dev-readme.md

image: registry.gitlab.com/cyber-dojo/ci-runner:v12

stages:
  - trigger


trigger-main:
  stage: trigger
  rules:
    - if: $CI_COMMIT_TAG == null
    - when: never
  trigger:
    include: .gitlab/workflows/main.yml
    strategy: depend

trigger-staging:
  stage: trigger
  rules:
    - if: $CI_COMMIT_TAG == null
    - when: never
  trigger:
    include: .gitlab/workflows/main_staging.yml
    strategy: depend

trigger-main-trails:
  stage: trigger
  rules:
    - if: $CI_COMMIT_TAG == null
    - when: never
  trigger:
    include: .gitlab/workflows/trails.yml
    strategy: depend

trigger-staging-trails:
  stage: trigger
  rules:
    - if: $CI_COMMIT_TAG == null
    - when: never
  trigger:
    include: .gitlab/workflows/trails_staging.yml
    strategy: depend
