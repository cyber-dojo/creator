# Edit this line to force a CI run: 176

# Remove the rules for the triggers, and specify the
# rules inside the child pipelines instead.
# See https://gitlab.com/gitlab-org/gitlab/-/issues/222370

image: registry.gitlab.com/cyber-dojo/ci-runner:v3

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'

stages:
  - trigger

#job1:
