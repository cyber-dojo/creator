
image: registry.gitlab.com/cyber-dojo/ci-runner:v8

workflow:
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /See merge request/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - pre-stage
  - lint-stage
  - build-image-stage
  - test-stage
  - beta-deployment-stage
  - prod-approval-stage
  - sdlc-control-gate-stage
  - prod-deployment-stage

variables:
  # KOSLI_DRY_RUN: false                             # Org env-var
  # KOSLI_FLOW: creator                              # Repo env-var
  KOSLI_ORG: cyber-dojo-trails
  KOSLI_HOST: ${KOSLI_HOST_STAGING}                  # Org env-var https://staging.app.kosli.com
  KOSLI_API_TOKEN: ${KOSLI_API_TOKEN_TRAILS_STAGING} # Org env-var
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: 1
  DOCKER_CERT_PATH: "${DOCKER_TLS_CERTDIR}/client"


pre:
  stage: pre-stage
  script:
    - kosli create flow ${KOSLI_FLOW} 
       --description="UX for Group/Kata creation"
       --template-file=.kosli.yml

    - kosli begin trail "${CI_COMMIT_SHA}"


lint:
  stage: lint-stage
  needs: [ pre ]
  script:
    - export LINT_EVIDENCE_DIR=/tmp/evidence/lint
    - mkdir -p "${LINT_EVIDENCE_DIR}"
    - set +e
    - rubocop --raise-cop-error . > "${LINT_EVIDENCE_DIR}"/rubocop.log
    - STATUS=$?
    - set -e

    - KOSLI_LINT_COMPLIANT=$([ ${STATUS} = 0 ] && echo true || echo false)
    - cp .rubocop.yml ${LINT_EVIDENCE_DIR}
    - kosli attest generic
        --compliant="${KOSLI_LINT_COMPLIANT}"
        --evidence-paths="${LINT_EVIDENCE_DIR}"
        --trail="${CI_COMMIT_SHA}"
        --name=lint

    - exit ${STATUS}


pull-request:
  stage: test-stage
  needs: [ pre ]
  script:
    - kosli attest pullrequest gitlab 
        --assert
        --gitlab-token=${KOSLI_GITLAB_TOKEN} 
        --name=pull-request
        --trail="${CI_COMMIT_SHA}"


build-image:
  stage: build-image-stage
  needs: [ pre ]
  services: [ docker:24.0.5-dind ]
  artifacts:
    paths: [ kosli/ ]
  script:
    - IMAGE_NAME=cyberdojo/${CI_PROJECT_NAME}:${CI_COMMIT_SHA:0:7}
    - ./sh/wait_for_image.sh ${IMAGE_NAME}

    - mkdir kosli
    - FINGERPRINT=$(kosli fingerprint ${IMAGE_NAME} --artifact-type=docker)
    - echo ${FINGERPRINT} > kosli/fingerprint
    - echo ${IMAGE_NAME}  > kosli/image_name

    - kosli attest artifact $(cat kosli/image_name)
        --fingerprint=$(cat kosli/fingerprint)
        --name=creator
        --trail="${CI_COMMIT_SHA}"


unit-test:
  stage: test-stage
  needs: [ build-image ]
  services: [ docker:24.0.5-dind ]
  artifacts:
    paths: [ kosli/ ]
  script:
    - set +e
    - source ./sh/run_tests_with_coverage.sh
    - run_tests_with_coverage
    - STATUS=$?
    - set -e

    - KOSLI_COMPLIANT=$([ ${STATUS} = 0 ] && echo true || echo false)

    - kosli attest junit $(cat kosli/image_name)
        --fingerprint=$(cat kosli/fingerprint)
        --name=creator.unit-test
        --results-dir=test/server/reports/junit
        --trail="${CI_COMMIT_SHA}"

    - kosli attest generic $(cat kosli/image_name)
        --evidence-paths=./test/evidence.json,./test/server/reports,./test/client/reports
        --compliant=${KOSLI_COMPLIANT}
        --fingerprint=$(cat kosli/fingerprint)
        --name=creator.branch-coverage
        --trail="${CI_COMMIT_SHA}"

    - exit ${STATUS}


security-scan:
  stage: test-stage
  needs: [ build-image ]
  artifacts:
    paths: [ kosli/ ]
  script:
    - set +e
    - snyk container test $(cat kosli/image_name)
        --file=Dockerfile
        --json-file-output=snyk.json
        --policy-path=.snyk
    - STATUS=$?
    - set -e

    - kosli attest snyk $(cat kosli/image_name)
        --fingerprint=$(cat kosli/fingerprint)
        --name=creator.snyk-scan
        --scan-results=snyk.json
        --trail="${CI_COMMIT_SHA}"

    - exit ${STATUS}


beta-deployment:
  stage: beta-deployment-stage
  needs: [ lint, pull-request, unit-test, security-scan ]
  services: [ docker:24.0.5-dind ]
  artifacts:
    paths: [ kosli/ ]
  variables:
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID_BETA}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY_BETA}
    KOSLI_ENVIRONMENT_NAME: aws-beta
  script:
    - kosli expect deployment $(cat kosli/image_name)
        --fingerprint=$(cat kosli/fingerprint)
        --description "Deployed to ${KOSLI_ENVIRONMENT_NAME} in Gitlab pipeline"
        --environment ${KOSLI_ENVIRONMENT_NAME}

    - ./sh/wait_for_deployment.sh 
        $(cat kosli/image_name)
        ${KOSLI_ENVIRONMENT_NAME}



prod-approval:
  stage: prod-approval-stage
  needs: [ beta-deployment ]
  artifacts:
    paths: [ kosli/ ]
  script:
    - kosli report approval $(cat kosli/image_name)
        --fingerprint=$(cat kosli/fingerprint)
        --description="Approved in Gitlab pipeline"
        --environment=aws-prod
        --approver="${GITLAB_USER_NAME} <${GITLAB_USER_EMAIL}>"


sdlc-control-gate:
  stage: sdlc-control-gate-stage
  needs: [ prod-approval ]
  artifacts:
    paths: [ kosli/ ]
  script:
    - kosli assert artifact $(cat kosli/image_name)
        --fingerprint=$(cat kosli/fingerprint)


prod-deployment:
  stage: prod-deployment-stage
  needs: [ sdlc-control-gate ]
  services: [ docker:24.0.5-dind ]
  artifacts:
    paths: [ kosli/ ]
  variables:
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID_PROD}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY_PROD}
    KOSLI_ENVIRONMENT_NAME: aws-prod
  script:
    - kosli expect deployment $(cat kosli/image_name)
        --fingerprint=$(cat kosli/fingerprint)
        --description "Deployed to ${KOSLI_ENVIRONMENT_NAME} in Gitlab pipeline"
        --environment ${KOSLI_ENVIRONMENT_NAME}

    - ./sh/wait_for_deployment.sh 
        $(cat kosli/image_name)
        ${KOSLI_ENVIRONMENT_NAME}
