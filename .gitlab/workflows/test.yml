image: registry.gitlab.com/cyber-dojo/ci-runner:v9

workflow:
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /See merge request/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - test-stage

variables:
  # KOSLI_DRY_RUN: false                          # Org env-var
  # KOSLI_FLOW: creator                           # Repo env-var
  KOSLI_ORG: cyber-dojo-trails
  KOSLI_HOST: ${KOSLI_HOST_PROD}                  # Org env-var https://app.kosli.com
  KOSLI_API_TOKEN: ${KOSLI_API_TOKEN_TRAILS_PROD} # Org env-var
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: 1
  DOCKER_CERT_PATH: "${DOCKER_TLS_CERTDIR}/client"

default:
  artifacts:
    reports:
      dotenv: kosli.env
  before_script:
    # See dev-readme.md : What is my branch?
    - git checkout -b ${CI_COMMIT_BRANCH}
    - if [ ! -f kosli.env ]; then touch kosli.env; fi


job-1:
  stage: test-stage
  script:
    - echo "BUILD_VERSION=hello" >> kosli.env
    - echo "BUILD_VERSION=:${BUILD_VERSION}:"
    - cat kosli.env
    - export $(cat kosli.env)
    - echo "BUILD_VERSION=:${BUILD_VERSION}:"


job-2:
  stage: test-stage
  needs:
    - job: job-1
      artifacts: true
  script:
    - echo "BUILD_VERSION=:${BUILD_VERSION}:"


job-3:
  stage: test-stage
  needs:
    - job: job-1
      artifacts: true
  script:
    - echo "BUILD_VERSION=:${BUILD_VERSION}:"
    - echo "XYZ=42" >> kosli.env


job-4:
  stage: test-stage
  needs:
    - job: job-3
      artifacts: true
  script:
    - echo "BUILD_VERSION=:${BUILD_VERSION}:"
    - echo "XYZ=:${XYZ}:"
