
image: registry.gitlab.com/cyber-dojo/ci-runner:v2.11.8

workflow:
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /See merge request/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - setup-stage
  - pre-build-test-stage
  - build-image-stage
  - post-build-test-stage
  - sdlc-control-gate-stage
  - beta-approval-stage
  - beta-deployment-stage
  - prod-approval-stage
  - prod-deployment-stage

variables:
  # KOSLI_DRY_RUN: false                   # Org env-var
  # KOSLI_FLOW: creator-ci                 # Repo env-var
  # KOSLI_TRAIL: $CI_COMMIT_SHA            # Repo env-var (Expanded)
  # KOSLI_HOST: https://app.kosli.com      # Org env-var
  # KOSLI_API_TOKEN: ...                   # Org env-var (Masked)
  KOSLI_ORG: cyber-dojo
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: 1
  DOCKER_CERT_PATH: "${DOCKER_TLS_CERTDIR}/client"


default:
  artifacts:
    reports:
      dotenv: kosli.env
  before_script:
    # See dev-readme.md : What is my branch?
    - git checkout -b ${CI_COMMIT_BRANCH}
    # Make dir for kosli auto-uploaded attachments
    - echo "KOSLI_ATTACHMENTS=/tmp/kosli_attachments" >> kosli.env
    - export $(cat kosli.env)
    - mkdir -p "${KOSLI_ATTACHMENTS}"


setup:
  stage: setup-stage
  script:
    - echo "IMAGE_NAME=cyberdojo/${CI_PROJECT_NAME}:${CI_COMMIT_SHA:0:7}" >> kosli.env
    - kosli begin trail "${KOSLI_TRAIL}"
        --template-file=.kosli.yml


pull-request:
  stage: pre-build-test-stage
  needs: [ setup ]
  script:
    - kosli attest pullrequest gitlab 
        --assert
        --gitlab-token=${KOSLI_GITLAB_TOKEN} 
        --name=pull-request


lint:
  stage: pre-build-test-stage
  needs: [ setup ]
  script:
    - set +e
    - rubocop --raise-cop-error . | tee "${KOSLI_ATTACHMENTS}"/rubocop.log
    - STATUS=${PIPESTATUS[0]}
    - set -e

    - KOSLI_COMPLIANT=$([ ${STATUS} = 0 ] && echo true || echo false)
    - cp .rubocop.yml ${KOSLI_ATTACHMENTS}
    - kosli attest generic
        --attachments="${KOSLI_ATTACHMENTS}"
        --compliant="${KOSLI_COMPLIANT}"
        --name=creator.lint

    - exit ${STATUS}


build-image:
  stage: build-image-stage
  needs: [ setup ]
  services: [ docker:24.0.5-dind ]
  script:
    - source ./sh/echo_env_vars.sh
    - export $(echo_env_vars)
    - docker compose build --build-arg COMMIT_SHA=${CI_COMMIT_SHA}
    - echo "${DOCKER_PASSWORD}" | docker login --username "${DOCKER_USERNAME}" --password-stdin
    - docker push ${IMAGE_NAME}
    - export DOCKER_API_VERSION=1.43
    - KOSLI_FINGERPRINT=$(kosli fingerprint ${IMAGE_NAME} --artifact-type=docker)
    - echo "KOSLI_FINGERPRINT=${KOSLI_FINGERPRINT}" >> kosli.env
    - kosli attest artifact ${IMAGE_NAME}
        --fingerprint=${KOSLI_FINGERPRINT}      
        --name=creator


unit-test:
  stage: post-build-test-stage
  needs: [ build-image, setup ]
  services: [ docker:24.0.5-dind ]
  script:
    - set +e
    - source ./sh/run_tests_with_coverage.sh
    - run_tests_with_coverage
    - STATUS=$?
    - set -e

    - kosli attest junit ${IMAGE_NAME}
        --name=creator.unit-test
        --results-dir=test/server/reports/junit

    - KOSLI_COMPLIANT=$([ ${STATUS} = 0 ] && echo true || echo false)
    - kosli attest generic
        --attachments=./test/evidence.json
        --attachments=./test/server/reports
        --attachments=./test/client/reports
        --compliant=${KOSLI_COMPLIANT}
        --description="server & client branch-coverage"      
        --name=creator.branch-coverage

    - exit ${STATUS}


security-scan:
  stage: post-build-test-stage
  needs: [ build-image, setup ]
  script:
    - set +e
    - snyk container test ${IMAGE_NAME}
        --policy-path=.snyk
        --sarif
        --sarif-file-output=snyk.container.scan.json
    - STATUS=$?
    - set -e

    - cp .snyk "${KOSLI_ATTACHMENTS}"
    - kosli attest snyk
        --name=creator.snyk-container-scan
        --scan-results=snyk.container.scan.json

    - exit ${STATUS}


sdlc-control-gate:
  stage: sdlc-control-gate-stage
  needs: [ setup, build-image, pull-request, lint, unit-test, security-scan ]
  script:
    - kosli assert artifact ${IMAGE_NAME}
        --environment=${KOSLI_AWS_BETA}


beta-approval:
  stage: beta-approval-stage
  needs: [ setup, build-image, sdlc-control-gate ]
  allow_failure: false
  script:
    - kosli report approval ${IMAGE_NAME}
        --description="Approved in Gitlab pipeline"
        --environment=${KOSLI_AWS_BETA}
        --approver="${GITLAB_USER_NAME} <${GITLAB_USER_EMAIL}>"


beta-deployment:
  stage: beta-deployment-stage
  needs: [ setup, build-image, beta-approval ]
  services: [ docker:24.0.5-dind ]
  artifacts:
    paths: [ kosli/ ]
  variables:
    AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID_BETA}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY_BETA}
  script:
    - docker pull ${IMAGE_NAME}
    - export ECR_REPO=244531986313.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/${CI_PROJECT_NAME}
    - export TF_VAR_TAGGED_IMAGE=${ECR_REPO}:${CI_COMMIT_SHA:0:7}
    - docker tag ${IMAGE_NAME} ${TF_VAR_TAGGED_IMAGE}
    - aws ecr get-login-password --region ${AWS_DEFAULT_REGION} | docker login --username AWS --password-stdin ${ECR_REPO}
    - docker push ${TF_VAR_TAGGED_IMAGE}
    - export TF_VAR_TAGGED_IMAGE=${ECR_REPO}:${CI_COMMIT_SHA:0:7}@sha256:${KOSLI_FINGERPRINT}
    - cd deployment/terraform && tf.sh apply


prod-approval:
  stage: prod-approval-stage
  needs: [ setup, build-image, beta-deployment ]
  when: manual
  allow_failure: false
  script:
    - kosli report approval ${IMAGE_NAME}
        --description="Approved in Gitlab pipeline"
        --environment=${KOSLI_AWS_PROD}
        --approver="${GITLAB_USER_NAME} <${GITLAB_USER_EMAIL}>"


prod-deployment:
  stage: prod-deployment-stage
  needs: [ setup, build-image, prod-approval ]
  services: [ docker:24.0.5-dind ]
  artifacts:
    paths: [ kosli/ ]
  variables:
    AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID_PROD}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY_PROD}
  script:
    - export ECR_REPO=244531986313.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/${CI_PROJECT_NAME}
    - aws ecr get-login-password --region ${AWS_DEFAULT_REGION} | docker login --username AWS --password-stdin ${ECR_REPO}
    - export TF_VAR_TAGGED_IMAGE=${ECR_REPO}:${CI_COMMIT_SHA:0:7}@sha256:${KOSLI_FINGERPRINT}
    - docker pull ${TF_VAR_TAGGED_IMAGE}
    - cd deployment/terraform && tf.sh apply


push-latest-image-to-public-registry:
  stage: prod-deployment-stage
  needs: [ setup, prod-deployment ]
  services: [ docker:24.0.5-dind ]
  artifacts:
    paths: [ kosli/ ]
  script:
    - docker pull ${IMAGE_NAME}
    - docker tag ${IMAGE_NAME} cyberdojo/${CI_PROJECT_NAME}:latest
    - echo "${DOCKER_PASSWORD}" | docker login --username "${DOCKER_USERNAME}" --password-stdin
    - docker push cyberdojo/${CI_PROJECT_NAME}:latest
